services:
  - type: web
    name: watchhentai-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: PORT
        value: 10000
      - key: BASE_URL
        value: https://watchhentai.net
